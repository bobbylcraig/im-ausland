<script>
  (function() {
  var map = null;
  var navigationToggle = null;
  var navigationDrawer = null;
  var liveMessageTimer = null;
  var routeSections = [
    { pathSelector: "#IN-SWITZ-1", sectionSelector: ".IN-SWITZ", disappearSpeed: 200 },
    {% for post in site.posts %}
      {% if post.to-id %}
        { pathSelector: "#{{ post.to-id }}", sectionSelector: ".{{ post.to-class }}", disappearSpeed: 200 },
      {% endif %}
      {% if post.from-id %}
        { pathSelector: "#{{ post.from-id }}", sectionSelector: ".{{ post.from-class }}", disappearSpeed: 200 },
      {% endif %}
    {% endfor %}
  ];
  var routeState = [];
  var fadeInLines = null;
  var fadeInBounds = null;
  var scrollTicking = false;
  var resizeTicking = false;
  var futureRouteOpacity = 0.05;
  var completedRouteOpacity = 0.18;
  var prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
  var supportsClipboard = !!(navigator.clipboard && navigator.clipboard.writeText);

  document.addEventListener("DOMContentLoaded", function() {
    navigationToggle = document.querySelector(".slide-activator");
    navigationDrawer = document.querySelector(".slide-out-nav");

    initNavigation();
    prepareLazyMedia();
    initMapExperience();
    initCopyLinks();
    scrollToHash();

    window.addEventListener("resize", onResize, { passive: true });
    window.addEventListener("scroll", onScroll, { passive: true });
    document.addEventListener("keydown", onDocumentKeydown);
  });

  function initNavigation() {
    if (!navigationToggle || !navigationDrawer) {
      return;
    }

    navigationToggle.addEventListener("click", toggleNavigation);

    var navLinks = navigationDrawer.querySelectorAll(".posts a");
    var i;
    for (i = 0; i < navLinks.length; i++) {
      navLinks[i].addEventListener("click", closeNavigation);
    }
  }

  function toggleNavigation() {
    var isOpen = navigationDrawer.classList.toggle("open");
    navigationToggle.classList.toggle("open", isOpen);
    navigationToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
  }

  function closeNavigation() {
    if (!navigationDrawer || !navigationDrawer.classList.contains("open")) {
      return;
    }

    navigationDrawer.classList.remove("open");
    navigationToggle.classList.remove("open");
    navigationToggle.setAttribute("aria-expanded", "false");
  }

  function onDocumentKeydown(event) {
    if (event.key === "Escape") {
      closeNavigation();
    }
  }

  function prepareLazyMedia() {
    var images = document.querySelectorAll(".blog-post img, .post .content img");
    var iframes = document.querySelectorAll("iframe");
    var i;

    for (i = 0; i < images.length; i++) {
      images[i].setAttribute("loading", "lazy");
      images[i].setAttribute("decoding", "async");
    }

    for (i = 0; i < iframes.length; i++) {
      iframes[i].setAttribute("loading", "lazy");
      iframes[i].setAttribute("referrerpolicy", "no-referrer-when-downgrade");
    }
  }

  function initMapExperience() {
    if (window.innerWidth <= 992 || prefersReducedMotion.matches) {
      return;
    }

    map = document.querySelector("svg");
    if (!map) {
      return;
    }

    setupTravelPaths();
    addPointLabels();

    fadeInLines = document.querySelector(".fade-in-lines");
    routeState = buildRouteState();
    recalcBounds();
    updateRoutes();
  }

  function setupTravelPaths() {
    var paths = document.getElementsByClassName("travel");
    var i;

    for (i = 0; i < paths.length; i++) {
      var length = paths[i].getTotalLength();
      paths[i].style["stroke-dasharray"] = length;
      paths[i].style["stroke-dashoffset"] = length;
      paths[i].style.opacity = futureRouteOpacity;
      paths[i].style.visibility = "visible";
    }
  }

  function addPointLabels() {
    var points = document.querySelectorAll("#points circle");
    var i;

    for (i = 0; i < points.length; i++) {
      if (points[i].previousElementSibling && points[i].previousElementSibling.classList.contains("map-point-label")) {
        continue;
      }

      var xCoord = parseFloat(points[i].getAttribute("cx")) + 8;
      var yCoord = parseFloat(points[i].getAttribute("cy")) + 3;
      var sentence = '<text class="map-point-label ' + points[i].id + '-text" x="' + xCoord + '" y="' + yCoord + '" font-family="Verdana" font-size="8" fill="black">' + points[i].id + "</text>";
      points[i].insertAdjacentHTML("beforeBegin", sentence);
    }
  }

  function buildRouteState() {
    var routes = [];
    var i;

    for (i = 0; i < routeSections.length; i++) {
      var path = document.querySelector(routeSections[i].pathSelector);
      var section = document.querySelector(routeSections[i].sectionSelector);

      if (!path || !section) {
        continue;
      }

      routes.push({
        path: path,
        section: section,
        disappearSpeed: routeSections[i].disappearSpeed,
        pathLength: path.getTotalLength(),
        top: 0,
        bottom: 0
      });
    }

    return routes;
  }

  function onScroll() {
    if (scrollTicking) {
      return;
    }

    scrollTicking = true;
    window.requestAnimationFrame(function() {
      updateRoutes();
      scrollTicking = false;
    });
  }

  function onResize() {
    if (resizeTicking) {
      return;
    }

    resizeTicking = true;
    window.requestAnimationFrame(function() {
      if (!map && window.innerWidth > 992 && !prefersReducedMotion.matches) {
        initMapExperience();
      }

      recalcBounds();
      updateRoutes();
      resizeTicking = false;
    });
  }

  function fullscreen() {
    return;
  }

  function recalcBounds() {
    var i;

    for (i = 0; i < routeState.length; i++) {
      var rect = routeState[i].section.getBoundingClientRect();
      routeState[i].top = rect.top + window.scrollY;
      routeState[i].bottom = routeState[i].top + routeState[i].section.offsetHeight;
    }

    routeState.sort(function(a, b) {
      return a.top - b.top;
    });

    fadeInBounds = null;
    if (fadeInLines) {
      var fadeRect = fadeInLines.getBoundingClientRect();
      var fadeTop = fadeRect.top + window.scrollY;
      fadeInBounds = {
        top: fadeTop,
        bottom: fadeTop + fadeInLines.offsetHeight
      };
    }
  }

  function updateRoutes() {
    if (!map || !routeState.length) {
      return;
    }

    var scrollTop = window.scrollY;
    var activeIndex = getActiveRouteIndex(scrollTop);
    var i;

    for (i = 0; i < routeState.length; i++) {
      var route = routeState[i];
      updateRoute(route, scrollTop, activeIndex, i);
    }
  }

  function getActiveRouteIndex(scrollTop) {
    var i;
    var activeIndex = -1;

    for (i = 0; i < routeState.length; i++) {
      if (scrollTop >= routeState[i].top && scrollTop <= routeState[i].bottom) {
        activeIndex = i;
      }
    }

    return activeIndex;
  }

  function updateRoute(route, scrollTop, activeIndex, routeIndex) {
    var offsetVal;

    if (activeIndex !== -1) {
      if (routeIndex < activeIndex) {
        offsetVal = 0;
      } else if (routeIndex > activeIndex) {
        offsetVal = route.pathLength;
      } else {
        offsetVal = getActiveRouteOffset(route, scrollTop);
      }
    } else if (scrollTop < route.top) {
      offsetVal = route.pathLength;
    } else if (scrollTop > route.bottom) {
      offsetVal = 0;
    } else {
      offsetVal = getActiveRouteOffset(route, scrollTop);
    }

    route.path.style["stroke-dashoffset"] = offsetVal;
    route.path.style.opacity = getRouteOpacity(route, scrollTop, activeIndex, routeIndex);
  }

  function getActiveRouteOffset(route, scrollTop) {
    var pathPercent = (scrollTop - route.top) / (route.bottom - route.top);
    var offsetVal = route.pathLength - (route.pathLength * pathPercent);
    boxChange(route.section.getAttribute("data-from"), route.section.getAttribute("data-to"), pathPercent);
    return offsetVal;
  }

  function getRouteOpacity(route, scrollTop, activeIndex, routeIndex) {
    if (activeIndex !== -1) {
      if (routeIndex < activeIndex) {
        return completedRouteOpacity;
      }

      if (routeIndex === activeIndex) {
        return 1;
      }

      return futureRouteOpacity;
    }

    if (scrollTop < route.top) {
      return futureRouteOpacity;
    }

    if (scrollTop > route.bottom) {
      return getCompletedRouteOpacity(route, scrollTop);
    }

    return 1;
  }

  function getCompletedRouteOpacity(route, scrollTop) {
    if (scrollTop <= route.bottom + 100) {
      return 1;
    }

    var percPast = 1 - ((scrollTop - route.bottom) / route.disappearSpeed);
    return Math.max(percPast, completedRouteOpacity);
  }

  function boxChange(from, to, percent) {
    if (!map || !from || !to) {
      return;
    }

    var fromList = from.split(" ");
    var toList = to.split(" ");
    var newViewBox = "";
    var i;

    for (i = 0; i < 4; i++) {
      var fromVal = parseInt(fromList[i], 10);
      var toVal = parseInt(toList[i], 10);
      var diff = Math.abs(fromVal - toVal);

      if (fromVal >= toVal) {
        newViewBox += Math.floor(fromVal - (diff * percent));
      } else {
        newViewBox += Math.floor(fromVal + (diff * percent));
      }

      newViewBox += " ";
    }

    map.setAttribute("viewBox", newViewBox);
  }

  function scrollToHash() {
    var hash = window.location.hash;
    if (!hash) {
      return;
    }

    var target = document.querySelector(hash);
    if (!target) {
      return;
    }

    target.scrollIntoView({
      behavior: prefersReducedMotion.matches ? "auto" : "smooth",
      block: "start"
    });
  }

  function initCopyLinks() {
    var buttons = document.querySelectorAll(".copy-link-btn");
    var i;

    for (i = 0; i < buttons.length; i++) {
      buttons[i].addEventListener("click", copyLink);
    }
  }

  function copyLink(event) {
    event.preventDefault();

    var text = event.currentTarget.getAttribute("data-clipboard-text");
    if (!text || !supportsClipboard) {
      showCopyMessage(false);
      return;
    }

    navigator.clipboard.writeText(text).then(function() {
      showCopyMessage(true);
    }).catch(function() {
      showCopyMessage(false);
    });
  }

  function showCopyMessage(wasSuccessful) {
    var otherMessage = document.querySelector(wasSuccessful ? ".error-copying" : ".copied");
    var message = document.querySelector(wasSuccessful ? ".copied" : ".error-copying");
    if (!message) {
      return;
    }

    if (liveMessageTimer) {
      window.clearTimeout(liveMessageTimer);
    }

    if (otherMessage) {
      otherMessage.classList.remove("visible");
    }

    message.classList.add("visible");
    liveMessageTimer = window.setTimeout(function() {
      message.classList.remove("visible");
    }, 1200);
  }
  })();
</script>

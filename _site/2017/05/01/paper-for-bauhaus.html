  <script>
  (() => {
    let map = null;
    let navigationToggle = null;
    let navigationDrawer = null;
    let liveMessageTimer = null;
    let routeState = [];
    let fadeInLines = null;
    let fadeInBounds = null;
    let scrollTicking = false;
    let resizeTicking = false;
    const futureRouteOpacity = 0.05;
    const completedRouteOpacity = 0.18;
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
    const supportsClipboard = !!(navigator.clipboard?.writeText);

    document.addEventListener("DOMContentLoaded", () => {
      navigationToggle = document.querySelector(".slide-activator");
      navigationDrawer = document.querySelector(".slide-out-nav");

      initNavigation();
      initMapExperience();
      initCopyLinks();
      scrollToHash();

      window.addEventListener("resize", onResize, { passive: true });
      window.addEventListener("scroll", onScroll, { passive: true });
      window.addEventListener("hashchange", onHashChange);
      document.addEventListener("keydown", onDocumentKeydown);
    });

    function initNavigation() {
      if (!navigationToggle || !navigationDrawer) return;
      navigationToggle.addEventListener("click", toggleNavigation);
      navigationDrawer.querySelectorAll(".posts a").forEach(link =>
        link.addEventListener("click", closeNavigation)
      );
    }

    function toggleNavigation() {
      const isOpen = navigationDrawer.classList.toggle("open");
      navigationToggle.classList.toggle("open", isOpen);
      navigationToggle.setAttribute("aria-expanded", String(isOpen));
    }

    function closeNavigation() {
      if (!navigationDrawer?.classList.contains("open")) return;
      navigationDrawer.classList.remove("open");
      navigationToggle.classList.remove("open");
      navigationToggle.setAttribute("aria-expanded", "false");
    }

    function onDocumentKeydown({ key }) {
      if (key === "Escape") closeNavigation();
    }

    // When a sidebar link is clicked the browser jumps instantly to the anchor.
    // One rAF gives the browser time to land before we repaint the map.
    function onHashChange() {
      requestAnimationFrame(() => { recalcBounds(); updateRoutes(); snapViewBox(); });
    }

    // Snap the SVG viewBox to the correct position for the current scroll
    // without waiting for a scroll event. Called after hash-jumps.
    function snapViewBox() {
      if (!map) return;
      const currentScroll = scrollY;

      // Active route: interpolate between from/to
      for (const route of routeState) {
        if (currentScroll >= route.top && currentScroll <= route.bottom) {
          const percent = (currentScroll - route.top) / (route.bottom - route.top);
          boxChange(route.section.dataset.from, route.section.dataset.to, percent);
          return;
        }
      }

      // Below all routes → snap to the last completed route's end position
      for (let i = routeState.length - 1; i >= 0; i--) {
        if (currentScroll > routeState[i].bottom) {
          boxChange(routeState[i].section.dataset.from, routeState[i].section.dataset.to, 1);
          return;
        }
      }

      // Above all routes → snap to the first upcoming route's start position
      if (routeState.length > 0) {
        boxChange(routeState[0].section.dataset.from, routeState[0].section.dataset.to, 0);
      }
    }

    function initMapExperience() {
      if (window.innerWidth <= 992 || prefersReducedMotion.matches) return;

      map = document.querySelector("svg");
      if (!map) return;

      setupTravelPaths();
      addPointLabels();

      fadeInLines = document.querySelector(".fade-in-lines");
      routeState = buildRouteState();
      recalcBounds();
      updateRoutes();

      // Lazy-loaded images expand as you scroll, shifting every route's
      // absolute position. Re-measure via a debounced ResizeObserver so
      // bounds stay accurate without hammering on every pixel.
      let recalcTimer = null;
      const debouncedRecalc = () => {
        clearTimeout(recalcTimer);
        recalcTimer = setTimeout(() => { recalcBounds(); updateRoutes(); }, 100);
      };

      if (typeof ResizeObserver !== "undefined") {
        new ResizeObserver(debouncedRecalc).observe(document.body);
      } else {
        window.addEventListener("load", () => { recalcBounds(); updateRoutes(); });
      }
    }

    function setupTravelPaths() {
      for (const path of document.getElementsByClassName("travel")) {
        const length = path.getTotalLength();
        path.style.strokeDasharray = length;
        path.style.strokeDashoffset = length;
        path.style.opacity = futureRouteOpacity;
        path.style.visibility = "visible";
      }
    }

    function addPointLabels() {
      for (const point of document.querySelectorAll("#points circle")) {
        if (point.previousElementSibling?.classList.contains("map-point-label")) continue;
        const x = parseFloat(point.getAttribute("cx")) + 8;
        const y = parseFloat(point.getAttribute("cy")) + 3;
        point.insertAdjacentHTML("beforebegin",
          `<text class="map-point-label ${point.id}-text" x="${x}" y="${y}" font-family="Verdana" font-size="8" fill="black">${point.id}</text>`
        );
      }
    }

    function buildRouteState() {
      const routes = [];

      const addRoute = (pathSelector, section, disappearSpeed = 200) => {
        const path = document.querySelector(pathSelector);
        if (!path || !section) return;
        routes.push({ path, section, disappearSpeed, pathLength: path.getTotalLength(), top: 0, bottom: 0 });
      };

      // Read route config from data attributes Jekyll bakes into each article.
      for (const article of document.querySelectorAll(".blog-post")) {
        const { toPath, toClass, fromPath, fromClass } = article.dataset;
        if (toPath) addRoute(toPath, article.querySelector(toClass));
        if (fromPath) addRoute(fromPath, article.querySelector(fromClass));
      }

      // The Switzerland mid-section has no dedicated article; find it directly.
      addRoute("#IN-SWITZ-1", document.querySelector(".IN-SWITZ"));

      return routes;
    }

    function onScroll() {
      if (scrollTicking) return;
      scrollTicking = true;
      requestAnimationFrame(() => { updateRoutes(); scrollTicking = false; });
    }

    function onResize() {
      if (resizeTicking) return;
      resizeTicking = true;
      requestAnimationFrame(() => {
        if (!map && window.innerWidth > 992 && !prefersReducedMotion.matches) initMapExperience();
        recalcBounds();
        updateRoutes();
        resizeTicking = false;
      });
    }

    function recalcBounds() {
      for (const route of routeState) {
        const { top } = route.section.getBoundingClientRect();
        route.top = top + scrollY;
        route.bottom = route.top + route.section.offsetHeight;
      }
      routeState.sort((a, b) => a.top - b.top);

      if (fadeInLines) {
        const { top } = fadeInLines.getBoundingClientRect();
        const fadeTop = top + scrollY;
        fadeInBounds = { top: fadeTop, bottom: fadeTop + fadeInLines.offsetHeight };
      }
    }

    function updateRoutes() {
      if (!map || !routeState.length) return;
      const currentScroll = scrollY;
      const activeIndex = getActiveRouteIndex(currentScroll);
      routeState.forEach((route, i) => updateRoute(route, currentScroll, activeIndex, i));
    }

    const getActiveRouteIndex = (currentScroll) =>
      routeState.findIndex(r => currentScroll >= r.top && currentScroll <= r.bottom);

    function updateRoute(route, currentScroll, activeIndex, routeIndex) {
      let offsetVal;

      if (activeIndex !== -1) {
        if (routeIndex < activeIndex)      offsetVal = 0;
        else if (routeIndex > activeIndex) offsetVal = route.pathLength;
        else                               offsetVal = getActiveRouteOffset(route, currentScroll);
      } else if (currentScroll < route.top) {
        offsetVal = route.pathLength;
      } else if (currentScroll > route.bottom) {
        offsetVal = 0;
      } else {
        offsetVal = getActiveRouteOffset(route, currentScroll);
      }

      route.path.style.strokeDashoffset = offsetVal;
      route.path.style.opacity = getRouteOpacity(route, currentScroll, activeIndex, routeIndex);
    }

    function getActiveRouteOffset(route, currentScroll) {
      const pathPercent = (currentScroll - route.top) / (route.bottom - route.top);
      boxChange(route.section.dataset.from, route.section.dataset.to, pathPercent);
      return route.pathLength * (1 - pathPercent);
    }

    function getRouteOpacity(route, currentScroll, activeIndex, routeIndex) {
      if (activeIndex !== -1) {
        if (routeIndex < activeIndex)      return completedRouteOpacity;
        if (routeIndex === activeIndex)    return 1;
        return futureRouteOpacity;
      }
      if (currentScroll < route.top)    return futureRouteOpacity;
      if (currentScroll > route.bottom) return getCompletedRouteOpacity(route, currentScroll);
      return 1;
    }

    function getCompletedRouteOpacity(route, currentScroll) {
      if (currentScroll <= route.bottom + 100) return 1;
      return Math.max(1 - (currentScroll - route.bottom) / route.disappearSpeed, completedRouteOpacity);
    }

    function boxChange(from, to, percent) {
      if (!map || !from || !to) return;
      const fromCoords = from.split(" ").map(Number);
      const toCoords   = to.split(" ").map(Number);
      const viewBox = fromCoords.map((val, i) =>
        Math.floor(val + (toCoords[i] - val) * percent)
      ).join(" ");
      map.setAttribute("viewBox", viewBox);
    }

    function scrollToHash() {
      if (!location.hash) return;
      document.querySelector(location.hash)?.scrollIntoView({
        behavior: prefersReducedMotion.matches ? "auto" : "smooth",
        block: "start",
      });
    }

    function initCopyLinks() {
      document.querySelectorAll(".copy-link-btn").forEach(btn =>
        btn.addEventListener("click", copyLink)
      );
    }

    function copyLink(event) {
      event.preventDefault();
      const text = event.currentTarget.getAttribute("data-clipboard-text");
      if (!text || !supportsClipboard) { showCopyMessage(false); return; }
      navigator.clipboard.writeText(text)
        .then(() => showCopyMessage(true))
        .catch(() => showCopyMessage(false));
    }

    function showCopyMessage(wasSuccessful) {
      const message = document.querySelector(wasSuccessful ? ".copied" : ".error-copying");
      const other   = document.querySelector(wasSuccessful ? ".error-copying" : ".copied");
      if (!message) return;
      clearTimeout(liveMessageTimer);
      other?.classList.remove("visible");
      message.classList.add("visible");
      liveMessageTimer = setTimeout(() => message.classList.remove("visible"), 1200);
    }
  })();
</script>
